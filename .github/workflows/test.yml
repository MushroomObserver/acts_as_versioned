name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
        appraisal:
          - rails-7.2
          - rails-8.0
          - rails-8.1

    name: Ruby ${{ matrix.ruby }} / ${{ matrix.appraisal }}

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.appraisal == 'rails-7.2' && 'rails_7.2.gemfile' || matrix.appraisal == 'rails-8.0' && 'rails_8.0.gemfile' || 'rails_8.1.gemfile' }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: bundle exec rake test
